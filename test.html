<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Buttons</title>
    <style>
        .view {
            display: none;
            padding: 20px;
            border: 1px solid #ccc;
            margin: 10px;
        }
        .view.active {
            display: block;
        }
        .primary-cta {
            background-color: var(--clr-amber, #E8872A);
            color: var(--clr-white, #FFFFFF);
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .primary-cta:hover {
            background-color: var(--clr-amber-hover, #D9741B);
        }
    </style>
</head>
<body>
    <h1>Test Buttons</h1>
    
    <div id="landing-page" class="view active">
        <h2>Landing Page</h2>
        <p>This is the landing page</p>
        <button class="primary-cta" id="hero-start-btn">Start Free Calculation</button>
    </div>
    
    <div id="wizard-page" class="view">
        <h2>Wizard Page</h2>
        <p>This is the wizard page</p>
        <button class="primary-cta" id="back-to-home">Back to Home</button>
    </div>

    <script>
        // Test script
        document.addEventListener('DOMContentLoaded', () => {
            const landingPage = document.getElementById('landing-page');
            const wizardPage = document.getElementById('wizard-page');
            const heroStartBtn = document.getElementById('hero-start-btn');
            const backToHome = document.getElementById('back-to-home');

            function showView(viewToShow) {
                console.log('Switching view to:', viewToShow.id);
                document.querySelectorAll('.view').forEach(view => {
                    view.classList.remove('active');
                });
                viewToShow.classList.add('active');
                console.log('View switched successfully');
            }

            if (heroStartBtn) {
                heroStartBtn.addEventListener('click', () => {
                    console.log('Hero Start button clicked');
                    showView(wizardPage);
                });
            } else {
                console.log('Hero Start button not found');
            }

            if (backToHome) {
                backToHome.addEventListener('click', () => {
                    console.log('Back to Home button clicked');
                    showView(landingPage);
                });
            } else {
                console.log('Back to Home button not found');
            }

            console.log('Script loaded successfully');
        });
    </script>
</body>
</html>
